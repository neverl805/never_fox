name: build native engine

# NSS/NSPR/brotli/zstd come prebuilt from each platform's package manager — only
# the ~250-line engine compiles. Every build is gated by verify.py, which asserts
# the output ClientHello is byte-for-byte Firefox 152.
#
# Linux uses a Fedora container: its NSS is a FULL build (X25519MLKEM768 + RFC 8879
# cert compression), unlike conda-forge's stripped NSS which dropped both.

on:
  push:
    branches: [main]
    paths: ["native/**", ".github/workflows/build.yml"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux2014 (glibc 2.17) -> runs on CentOS 7+ and almost any Linux
          - { name: linux-x86_64, os: ubuntu-latest,    container: 'quay.io/pypa/manylinux2014_x86_64' }
          - { name: linux-arm64,  os: ubuntu-24.04-arm, container: 'quay.io/pypa/manylinux2014_aarch64' }
          # macOS + Windows already verified == Firefox 152; re-enable for release:
          # - { name: macos-arm64,    os: macos-14 }
          # - { name: windows-x86_64, os: windows-latest }
    steps:
      - name: container prereqs (linux)        # git/tar must exist before checkout
        if: runner.os == 'Linux'
        run: yum install -y git tar xz gzip || true

      - uses: actions/checkout@v4

      # ---- Linux: conda NSS (glibc 2.17) to link + Firefox 152's NSS to run ----
      - name: build + verify (linux, manylinux2014 / CentOS7+ compat)
        if: runner.os == 'Linux'
        run: bash native/build_manylinux.sh

      # ---- macOS: prebuilt NSS from Homebrew ----
      - name: deps (macos)
        if: runner.os == 'macOS'
        run: brew install nss nspr brotli zstd
      - name: build + verify (macos)
        if: runner.os == 'macOS'
        run: |
          python3 native/build.py
          python3 native/bundle.py
          python3 native/verify.py

      # ---- Windows: prebuilt NSS from MSYS2 (mingw) ----
      - name: setup msys2 (windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-nss mingw-w64-x86_64-nspr
            mingw-w64-x86_64-brotli mingw-w64-x86_64-zstd mingw-w64-x86_64-zlib
            mingw-w64-x86_64-python
      - name: build + verify (windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python native/build.py
          python native/bundle.py || echo "bundle: best-effort"
          python native/verify.py

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: never_fox-engine-${{ matrix.name }}
          path: |
            native/libfxtls.*
            native/vendor/**
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: zip per platform
        run: |
          cd dist
          for d in */; do (cd "$d" && zip -r "../${d%/}.zip" .); done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
