name: build native engine

# NSS/NSPR/brotli/zstd come prebuilt from each platform's package manager — only
# the ~250-line engine compiles. Every build is gated by verify.py, which asserts
# the output ClientHello is byte-for-byte Firefox 152.
#
# Linux uses a Fedora container: its NSS is a FULL build (X25519MLKEM768 + RFC 8879
# cert compression), unlike conda-forge's stripped NSS which dropped both.

on:
  push:
    branches: [main]
    paths: ["native/**", ".github/workflows/build.yml"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux2014 (glibc 2.17) -> runs on CentOS 7+ and almost any Linux.
          # The job runs on the HOST (modern glibc, so checkout's Node works); the
          # build itself happens inside the old-glibc container via `docker run`.
          - { name: linux-x86_64, os: ubuntu-latest,    dockerimg: 'quay.io/pypa/manylinux2014_x86_64' }
          - { name: linux-arm64,  os: ubuntu-24.04-arm, dockerimg: 'quay.io/pypa/manylinux2014_aarch64' }
          - { name: macos-arm64,    os: macos-14 }
          - { name: windows-x86_64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      # ---- Linux: build inside manylinux2014 (conda NSS to link + Firefox's NSS to run) ----
      - name: build + verify (linux, manylinux2014 / CentOS7+ compat)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD:/io" -w /io "${{ matrix.dockerimg }}" \
            bash native/build_manylinux.sh

      # ---- macOS: prebuilt NSS from Homebrew ----
      - name: deps (macos)
        if: runner.os == 'macOS'
        run: brew install nss nspr brotli zstd
      - name: build + verify + wheel (macos)
        if: runner.os == 'macOS'
        run: |
          python3 native/build.py
          python3 native/bundle.py
          python3 native/verify.py
          python3 native/stage_lib.py
          python3 -m pip wheel . --no-deps -w dist
      - name: smoke test (macos)
        if: runner.os == 'macOS'
        run: |
          python3 -m venv "$RUNNER_TEMP/venv"        # avoid PEP 668 (Homebrew python is externally managed)
          "$RUNNER_TEMP/venv/bin/pip" install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv/bin/python" -c "import never_fox; from never_fox import _native; \
          r=_native._lib.fxtls_have_roots(); print('have_roots=', r); assert r==1; print('wheel OK')"

      # ---- Windows: engine from MSYS2 (mingw), wheel from stock CPython ----
      - name: setup python (windows)            # stock CPython -> correct win_amd64 tag
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: setup msys2 (windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-nss mingw-w64-x86_64-nspr
            mingw-w64-x86_64-brotli mingw-w64-x86_64-zstd mingw-w64-x86_64-zlib
            mingw-w64-x86_64-python
      - name: build engine + verify (windows, msys2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python native/build.py
          python native/bundle.py || echo "bundle: best-effort"
          python native/verify.py
          python native/stage_lib.py
      - name: build wheel + smoke (windows, stock CPython)
        if: runner.os == 'Windows'
        run: |
          python -m pip wheel . --no-deps -w dist
          python -m pip install (Get-Item dist/*.whl).FullName
          cd $env:RUNNER_TEMP
          python -c "import never_fox; from never_fox import _native; r=_native._lib.fxtls_have_roots(); print('have_roots=', r); assert r==1, 'NSS roots failed'; print('wheel OK')"

      - name: upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: wheel-*, path: dist, merge-multiple: true }
      - run: ls -lh dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
